<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>연립방정식 타지아 활동</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@900&display=swap');
        
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: #f8fafc; 
            touch-action: none;
            overflow-x: hidden;
        }

        /* 퍼즐 판 전체 배경 */
        .board-bg {
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* 조각 디자인: 여유 공간 대폭 확대 */
        .piece-container {
            position: relative;
            background: #fff;
            border-radius: 1.5rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border: 4px solid #fff;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            overflow: visible; /* 글자가 박스 밖으로 살짝 나가도 안 잘리게 */
        }

        .selected-piece {
            transform: scale(1.05);
            outline: 8px solid #3b82f6;
            z-index: 100 !important;
        }

        /* 글자 영역: SVG처럼 위치를 강제 고정 */
        .equation-box {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: 900;
            color: #0f172a;
            /* y 꼬리가 잘리지 않도록 넉넉한 line-height와 padding 부여 */
            line-height: 1.6;
            padding: 8px;
            pointer-events: none;
        }

        /* 텍스트 크기: 기기별로 깨지지 않게 최적화 */
        .eq-text {
            font-size: clamp(0.9rem, 3.5vw, 1.4rem);
            white-space: pre-line;
            display: block;
            width: 100%;
        }

        /* 각 구역 설정 (중앙에 여유 공간 40% 확보하여 절대 겹치지 않음) */
        .top-area    { top: 0; left: 0; width: 100%; height: 33%; border-bottom: 2px dashed #f1f5f9; }
        .right-area  { right: 0; top: 0; width: 33%; height: 100%; border-left: 2px dashed #f1f5f9; }
        .bottom-area { bottom: 0; left: 0; width: 100%; height: 33%; border-top: 2px dashed #f1f5f9; }
        .left-area   { left: 0; top: 0; width: 33%; height: 100%; border-right: 2px dashed #f1f5f9; }

        /* 회전 방향에 따른 글자 정렬 보정 */
        .right-area  .eq-text { transform: rotate(90deg); width: 180px; }
        .bottom-area .eq-text { transform: rotate(180deg); }
        .left-area   .eq-text { transform: rotate(-90deg); width: 180px; }

        .rotation-0 { transform: rotate(0deg); }
        .rotation-1 { transform: rotate(90deg); }
        .rotation-2 { transform: rotate(180deg); }
        .rotation-3 { transform: rotate(270deg); }

        .wrong-slot { 
            background-color: #fee2e2 !important; 
            box-shadow: inset 0 0 0 8px #ef4444 !important;
        }
    </style>
</head>
<body class="board-bg min-h-screen">

    <!-- 첫 화면 -->
    <div id="login-screen" class="fixed inset-0 bg-slate-900 z-[200] flex items-center justify-center p-4">
        <div class="bg-white rounded-[3rem] p-10 max-w-md w-full shadow-2xl text-center border-b-[12px] border-blue-600">
            <div class="w-24 h-24 bg-blue-100 rounded-3xl mx-auto mb-6 flex items-center justify-center text-blue-600">
                <i data-lucide="puzzle" size="56"></i>
            </div>
            <h1 class="text-3xl font-black mb-4 text-slate-800">연립방정식 타지아</h1>
            <div class="bg-blue-50 p-6 rounded-2xl mb-8 text-blue-800 font-bold text-lg leading-relaxed">
                🧩 규칙: 인접한 모서리에 <br>
                <span class="underline decoration-4">문제와 정답</span>이 서로 <br>
                마주보게 배치하세요!
            </div>
            <input type="text" id="student-name" placeholder="이름을 입력하세요" class="w-full border-4 border-slate-100 bg-slate-50 rounded-2xl px-6 py-4 mb-6 text-center text-xl font-black outline-none focus:border-blue-600 transition-all">
            <button onclick="startGame()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-xl shadow-lg hover:bg-blue-700 transition-all">챌린지 시작</button>
        </div>
    </div>

    <!-- 메인 게임 -->
    <div id="game-screen" class="hidden p-4 md:p-8">
        <div class="max-w-7xl mx-auto">
            <header class="mb-8 flex flex-col md:flex-row justify-between items-center bg-white/90 backdrop-blur p-6 rounded-[2.5rem] shadow-sm gap-6">
                <div class="flex items-center gap-4">
                    <div class="bg-blue-600 p-4 rounded-2xl text-white shadow-xl">
                        <i data-lucide="user" size="32"></i>
                    </div>
                    <div>
                        <h2 class="text-2xl font-black text-slate-800"><span id="display-name" class="text-blue-600"></span> 학생</h2>
                        <p class="text-slate-500 font-bold text-sm italic">식과 해가 서로 맞닿아야 합니다.</p>
                    </div>
                </div>
                <div class="flex gap-4">
                    <button onclick="checkAnswer()" class="bg-green-600 text-white px-10 py-4 rounded-2xl font-black text-lg shadow-lg hover:bg-green-700">정답 확인</button>
                    <button onclick="resetBoard()" class="bg-slate-200 text-slate-700 px-6 py-4 rounded-2xl font-black hover:bg-slate-300">초기화</button>
                </div>
            </header>

            <div class="flex flex-col lg:flex-row gap-12 justify-center items-center lg:items-start">
                <div id="board" class="grid grid-cols-3 gap-6 bg-slate-400 p-8 rounded-[4rem] shadow-2xl border-8 border-slate-500"></div>
                
                <div class="w-full lg:w-[420px] bg-white/90 backdrop-blur-md p-8 rounded-[3rem] shadow-xl border-2 border-white">
                    <h3 class="font-black text-xl text-slate-800 mb-8 flex items-center gap-2">
                        <i data-lucide="box" class="text-blue-500"></i> 퍼즐 조각 보관함
                    </h3>
                    <div id="inventory" class="flex flex-wrap gap-4 justify-center min-h-[450px] content-start"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 결과 창 -->
    <div id="success-modal" class="fixed inset-0 bg-slate-900/95 backdrop-blur-xl hidden items-center justify-center z-[300] p-4">
        <div class="bg-white rounded-[4rem] p-12 max-w-md w-full text-center shadow-2xl border-t-[16px] border-green-500">
            <div class="text-9xl mb-6">🎖️</div>
            <h2 class="text-4xl font-black mb-4">완벽한 성공!</h2>
            <div class="bg-green-50 p-8 rounded-[2.5rem] mb-10 border-2 border-green-100">
                <p class="text-3xl font-black text-green-700 mb-2" id="cert-name"></p>
                <p class="text-slate-500 font-bold" id="cert-time"></p>
            </div>
            <button onclick="location.reload()" class="w-full bg-slate-900 text-white py-5 rounded-3xl font-black text-xl shadow-xl">활동 종료</button>
        </div>
    </div>

    <script>
        let studentName = "";
        let boardState = Array(9).fill(null);
        let inventory = [];
        let selectedId = null;

        function startGame() {
            const val = document.getElementById('student-name').value.trim();
            if(!val) return;
            studentName = val;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('display-name').innerText = studentName;
            initGame();
        }

        function getEqData() {
            const data = [];
            for(let i=0; i<12; i++) {
                const x = Math.floor(Math.random()*7)-3; 
                const y = Math.floor(Math.random()*7)-3;
                const sets = [
                    { q: `x + y = ${x+y}\nx - y = ${x-y}`, a: `(${x}, ${y})` },
                    { q: `2x + y = ${2*x+y}\nx + y = ${x+y}`, a: `x=${x}\ny=${y}` },
                    { q: `x + 2y = ${x+2*y}\nx - y = ${x-y}`, a: `(${x}, ${y})` }
                ];
                data.push(sets[Math.floor(Math.random()*sets.length)]);
            }
            return data;
        }

        function initGame() {
            const eqData = getEqData();
            const pieces = [];
            for(let i=0; i<9; i++) pieces.push({ id: i, correctSlot: i, rotation: 0, edges: [null, null, null, null] });
            const conns = [[0,1,1,3],[1,1,2,3],[3,1,4,3],[4,1,5,3],[6,1,7,3],[7,1,8,3],[0,2,3,0],[1,2,4,0],[2,2,5,0],[3,2,6,0],[4,2,7,0],[5,2,8,0]];
            conns.forEach((c, i) => { pieces[c[0]].edges[c[1]] = eqData[i].q; pieces[c[2]].edges[c[3]] = eqData[i].a; });
            inventory = pieces.sort(() => Math.random() - 0.5).map(p => ({...p, rotation: Math.floor(Math.random()*4)}));
            render();
        }

        function render() {
            const boardEl = document.getElementById('board');
            const invEl = document.getElementById('inventory');
            boardEl.innerHTML = ''; invEl.innerHTML = '';

            boardState.forEach((piece, i) => {
                const slot = document.createElement('div');
                slot.className = `w-32 h-32 sm:w-40 sm:h-40 md:w-52 md:h-52 rounded-[2.5rem] flex items-center justify-center transition-all ${!piece ? 'bg-slate-300 border-4 border-dashed border-slate-400' : 'bg-white shadow-xl'}`;
                slot.onclick = () => onSlotClick(i);
                if(piece) slot.appendChild(createPieceUI(piece, true));
                else slot.innerHTML = `<span class="text-slate-500 font-black text-3xl opacity-30">${i+1}</span>`;
                boardEl.appendChild(slot);
            });
            inventory.forEach(p => invEl.appendChild(createPieceUI(p, false)));
            lucide.createIcons();
        }

        function createPieceUI(piece, isBoard) {
            const container = document.createElement('div');
            container.className = `piece-container flex items-center justify-center transition-all ${selectedId === piece.id ? 'selected-piece' : ''} ${isBoard ? 'w-full h-full' : 'w-24 h-24 sm:w-32 sm:h-32'}`;
            
            const rotator = document.createElement('div');
            rotator.className = `w-full h-full relative transition-all duration-500 rotation-${piece.rotation}`;
            
            const areas = ["top-area", "right-area", "bottom-area", "left-area"];
            piece.edges.forEach((text, i) => {
                if(!text) return;
                const box = document.createElement('div');
                box.className = `equation-box ${areas[i]}`;
                const span = document.createElement('span');
                span.className = "eq-text";
                span.innerText = text;
                box.appendChild(span);
                rotator.appendChild(box);
            });

            container.appendChild(rotator);
            container.onclick = (e) => {
                e.stopPropagation();
                if(isBoard && selectedId === null) { onSlotClick(boardState.indexOf(piece)); return; }
                selectedId = (selectedId === piece.id) ? null : piece.id;
                render();
            };
            
            const rotBtn = document.createElement('button');
            rotBtn.className = "absolute bottom-1 right-1 bg-blue-600 text-white rounded-2xl p-3 shadow-lg z-[110] hover:bg-blue-700 active:scale-90 transition-all";
            rotBtn.innerHTML = '<i data-lucide="refresh-cw" size="24"></i>';
            rotBtn.onclick = (e) => { e.stopPropagation(); piece.rotation = (piece.rotation + 1) % 4; render(); };
            container.appendChild(rotBtn);

            return container;
        }

        function onSlotClick(idx) {
            if(selectedId !== null) {
                const invIdx = inventory.findIndex(p => p.id === selectedId);
                const boardIdx = boardState.findIndex(p => p && p.id === selectedId);
                let pMove = (invIdx !== -1) ? inventory.splice(invIdx, 1)[0] : boardState.splice(boardIdx, 1)[0];
                if(boardState[idx]) inventory.push(boardState[idx]);
                boardState[idx] = pMove;
                selectedId = null;
            } else if(boardState[idx]) {
                inventory.push(boardState[idx]);
                boardState[idx] = null;
            }
            render();
        }

        function resetBoard() {
            boardState.forEach((p, i) => { if(p) inventory.push(p); boardState[i] = null; });
            selectedId = null; render();
        }

        function checkAnswer() {
            let wrongs = 0;
            const slots = document.getElementById('board').children;
            boardState.forEach((p, i) => {
                slots[i].classList.remove('wrong-slot');
                if(!p || p.correctSlot !== i || p.rotation !== 0) { wrongs++; slots[i].classList.add('wrong-slot'); }
            });
            if(wrongs === 0 && !boardState.includes(null)) {
                document.getElementById('cert-name').innerText = studentName;
                document.getElementById('cert-time').innerText = "활동 완료: " + new Date().toLocaleString();
                document.getElementById('success-modal').classList.remove('hidden');
                document.getElementById('success-modal').classList.add('flex');
            } else {
                alert(boardState.includes(null) ? "빈 칸이 남아있습니다!" : `틀린 부분이 ${wrongs}군데 있습니다. 빨간 칸을 확인하세요!`);
            }
        }
    </script>
</body>
</html>
